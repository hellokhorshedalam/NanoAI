<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NanoAI Assistant</title>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>

  <!-- Conversation list overlay -->
  <div id="conv-overlay" class="conv-overlay hidden">
    <div class="conv-panel">
      <div class="conv-header">
        <span class="conv-header-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Conversations
        </span>
        <button id="close-conv-btn" class="icon-btn" title="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="conv-list" class="conv-list"></div>
    </div>
  </div>

  <!-- Main App -->
  <div class="app">

    <!-- Header -->
    <header class="header">
      <button id="menu-btn" class="icon-btn" title="Conversations">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="header-title">
        <svg class="logo-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 16.8l-6.2 4.5 2.4-7.4L2 9.4h7.6z"/></svg>
        <span>NanoAI</span>
      </div>
      <div class="header-actions">
        <label class="agent-toggle" title="Enable Page Agent Mode">
          <input type="checkbox" id="agent-toggle">
          <span class="agent-slider">
            <svg class="agent-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          </span>
        </label>
        <button id="new-chat-btn" class="icon-btn" title="New Chat">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </div>
    </header>

    <!-- Status bar -->
    <div class="status-bar">
      <div id="status-dot" class="status-dot"></div>
      <span id="status-text">Initializing...</span>
    </div>

    <!-- Chat area -->
    <div id="chat-area" class="chat-area">
      <!-- Welcome screen -->
      <div id="welcome-screen" class="welcome">
        <div class="welcome-icon">
          <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#6366f1"/></linearGradient></defs>
            <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 16.8l-6.2 4.5 2.4-7.4L2 9.4h7.6z"/>
          </svg>
        </div>
        <h2>NanoAI Assistant</h2>
        <p>On-device AI powered by Gemini Nano — private &amp; fast</p>
        <div class="welcome-actions">
          <button class="quick-action-card" data-action="summarize">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            <span>Summarize Page</span>
          </button>
          <button class="quick-action-card" data-action="extract">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
            <span>Extract Data</span>
          </button>
          <button class="quick-action-card" data-action="translate">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            <span>Translate</span>
          </button>
          <button class="quick-action-card" data-action="explain">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7V17h8v-2.3A7 7 0 0 0 12 2z"/></svg>
            <span>Explain</span>
          </button>
        </div>
      </div>

      <!-- Messages -->
      <div id="messages" class="messages"></div>
    </div>

    <!-- Quick actions bar -->
    <div class="quick-actions">
      <button class="quick-btn" data-action="summarize">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Summarize
      </button>
      <button class="quick-btn" data-action="extract">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        Extract
      </button>
      <button class="quick-btn" data-action="translate">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/></svg>
        Translate
      </button>
      <button class="quick-btn" data-action="explain">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7V17h8v-2.3A7 7 0 0 0 12 2z"/></svg>
        Explain
      </button>
      <button class="quick-btn" data-action="write">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
        Write
      </button>
    </div>

    <!-- Agent Status Bar (Hidden by default) -->
    <div id="agent-status-bar" class="agent-status-bar hidden">
      <div class="agent-status-indicator">
        <div class="agent-pulse"></div>
        <span id="agent-status-text">Agent is thinking...</span>
      </div>
      <button id="stop-agent-btn" class="stop-agent-btn" title="Stop Agent">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>
        Stop
      </button>
    </div>

    <!-- Input area -->
    <div class="input-area">
      <textarea id="input" rows="1" placeholder="Message NanoAI..."></textarea>
      <button id="send-btn" class="send-btn" title="Send message">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
        </svg>
      </button>
    </div>

  </div>

  <script src="sidebar.js"></script>
</body>
</html>
